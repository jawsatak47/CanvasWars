<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS WARS | The Battle Engine</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #060608; --s1: #0e0e12; --s2: #16161c; --bdr: #252530;
            --red: #FF2600; --ora: #FF7A00; --blu: #00CFFF; --wht: #F0EDE8; --mut: #52526a;
        }

        body { background: var(--bg); color: var(--wht); font-family: 'Barlow Condensed', sans-serif; margin: 0; overflow-x: hidden; }
        .noise::after { content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .nav { height: 70px; background: rgba(14,14,18,0.95); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--bdr); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 32px; letter-spacing: 2px; color: var(--red); }
        .stats-bar { display: flex; gap: 20px; font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--mut); }
        .stat-val { color: var(--wht); font-weight: bold; }

        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 8px; padding: 20px; position: relative; }
        .btn-main { background: var(--red); color: white; border: none; padding: 12px; font-family: 'Bebas Neue'; font-size: 18px; cursor: pointer; border-radius: 4px; width: 100%; transition: 0.2s; }
        .btn-main:hover { filter: brightness(1.2); }
        
        .progress-container { height: 8px; background: var(--s2); border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.5s ease-out; }

        .badge-live { background: rgba(255, 38, 0, 0.15); color: var(--red); border: 1px solid var(--red); font-family: 'IBM Plex Mono'; font-size: 10px; padding: 4px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px; }
        .live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="noise">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const INITIAL_ARTISTS = [
            { id: 1, name: "Jaws", votes: 0, judgeScore: 0, color: '#FF2600' },
            { id: 2, name: "Aaron", votes: 0, judgeScore: 0, color: '#00CFFF' }
            { id: 3, name: "Tami", votes: 0, judgeScore: 0, color: '#FF2600' },
            { id: 4, name: "Chad", votes: 0, judgeScore: 0, color: '#00CFFF' }
            { id: 5, name: "Jim", votes: 0, judgeScore: 0, color: '#FF2600' },
            { id: 6, name: "Mike", votes: 0, judgeScore: 0, color: '#00CFFF' }
        ];

        function App() {
            const [userPoints, setUserPoints] = useState(150);
            const [artists, setArtists] = useState(INITIAL_ARTISTS);

            const getWeightedScore = (artist) => {
                const totalVotes = artists.reduce((acc, curr) => acc + curr.votes, 0);
                const crowdPercent = totalVotes > 0 ? (artist.votes / totalVotes) * 100 : 0;
                // 70% Judge / 30% Crowd
                return ((artist.judgeScore * 0.7) + (crowdPercent * 0.3)).toFixed(1);
            };

            const castVote = (id) => {
                if (userPoints >= 10) {
                    setArtists(artists.map(a => a.id === id ? { ...a, votes: a.votes + 1 } : a));
                    setUserPoints(userPoints - 10);
                } else {
                    alert("Low XP! Visit a sponsor booth to refill.");
                }
            };

            return (
                <div>
                    <nav className="nav">
                        <div className="logo">CANVAS WARS</div>
                        <div className="stats-bar">
                            <div>XP: <span className="stat-val">{userPoints}</span></div>
                            <div>DATE: <span className="stat-val">JUNE 6</span></div>
                        </div>
                    </nav>

                    <div style={{ padding: '40px 20px', maxWidth: '1000px', margin: '0 auto' }}>
                        <div style={{ marginBottom: '40px' }}>
                            <div className="badge-live"><span className="live-dot"></span> LIVE VOTING OPEN</div>
                            <h1 style={{ fontFamily: 'Bebas Neue', fontSize: '60px', margin: '10px 0', lineHeight: 1 }}>BEAR CREEK PARK BATTLE</h1>
                            <p style={{ color: 'var(--mut)', fontFamily: 'IBM Plex Mono', fontSize: '14px' }}>FINISH TIME: 4:00 PM | JUDGING: 4:30 PM</p>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
                            {artists.map(artist => (
                                <div key={artist.id} className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                        <h2 style={{ fontFamily: 'Bebas Neue', fontSize: '32px', margin: 0 }}>{artist.name}</h2>
                                        <div style={{ textAlign: 'right' }}>
                                            <div style={{ fontSize: '28px', fontWeight: 'bold', color: artist.color }}>{getWeightedScore(artist)}</div>
                                            <div style={{ fontSize: '10px', color: 'var(--mut)', fontFamily: 'IBM Plex Mono' }}>WEIGHTED RANK</div>
                                        </div>
                                    </div>
                                    
                                    <div className="progress-container">
                                        <div className="progress-fill" style={{ width: `${getWeightedScore(artist)}%`, background: artist.color }}></div>
                                    </div>

                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px', fontFamily: 'IBM Plex Mono', fontSize: '12px' }}>
                                        <span>CROWD: {artist.votes}</span>
                                        <span>JUDGE: {artist.judgeScore}</span>
                                    </div>

                                    <button className="btn-main" onClick={() => castVote(artist.id)}>
                                        VOTE (-10 XP)
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div style={{ marginTop: '50px', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '20px' }}>
                            <div className="card" style={{borderColor: 'var(--ora)'}}>
                                <h3 style={{fontFamily:'Bebas Neue', color: 'var(--ora)', marginTop: 0}}>💰 PRIZE POOL</h3>
                                <div style={{fontFamily: 'IBM Plex Mono', fontSize: '13px', color: 'var(--mut)'}}>
                                    1ST PLACE: <span style={{color: '#fff'}}>$300</span><br/>
                                    2ND PLACE: <span style={{color: '#fff'}}>$150</span><br/>
                                    3RD PLACE: <span style={{color: '#fff'}}>$75</span>
                                </div>
                            </div>
                            <div className="card" style={{borderColor: 'var(--blu)'}}>
                                <h3 style={{fontFamily:'Bebas Neue', color: 'var(--blu)', marginTop: 0}}>🛡️ RULES</h3>
                                <div style={{fontFamily: 'IBM Plex Mono', fontSize: '13px', color: 'var(--mut)'}}>
                                    MEDIUMS: WATER-BASED ONLY<br/>
                                    AUCTION: 70% TO ARTIST<br/>
                                    VOTING: ONE VOTE PER DEVICE
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
