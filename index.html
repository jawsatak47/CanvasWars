<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS WARS | Battle Engine</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #060608; --s1: #0e0e12; --s2: #16161c; --bdr: #252530;
            --red: #FF2600; --ora: #FF7A00; --blu: #00CFFF; --wht: #F0EDE8; --mut: #52526a;
        }

        body { background: var(--bg); color: var(--wht); font-family: 'Barlow Condensed', sans-serif; margin: 0; overflow-x: hidden; }
        .noise::after { content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .nav { height: 70px; background: rgba(14,14,18,0.95); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--bdr); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 2px; color: var(--red); cursor: pointer; }
        .nav-links { display: flex; gap: 20px; font-family: 'Bebas Neue'; font-size: 18px; }
        .nav-links span { cursor: pointer; transition: 0.2s; }
        .nav-links span:hover { color: var(--red); }

        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .btn-main { background: var(--red); color: white; border: none; padding: 12px; font-family: 'Bebas Neue'; font-size: 18px; cursor: pointer; border-radius: 4px; width: 100%; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; }
        .btn-main:hover { filter: brightness(1.2); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--mut); margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; }

        .progress-container { height: 8px; background: var(--s2); border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.5s ease-out; }
    </style>
</head>
<body class="noise">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('arena'); // Views: arena, signup, square
            const [userPoints, setUserPoints] = useState(150);
            const [artists, setArtists] = useState([
                { id: 1, name: "VANDAL QUEEN", votes: 142, judgeScore: 88, color: '#FF2600' },
                { id: 2, name: "THE PHANTOM", votes: 128, judgeScore: 92, color: '#00CFFF' }
            ]);

            const castVote = (id) => {
                if (userPoints >= 10) {
                    setArtists(artists.map(a => a.id === id ? { ...a, votes: a.votes + 1 } : a));
                    setUserPoints(userPoints - 10);
                } else { alert("Visit a sponsor booth for more XP!"); }
            };

            const ArenaView = () => (
                <div>
                    <div style={{ marginBottom: '30px' }}>
                        <h1 style={{ fontFamily: 'Bebas Neue', fontSize: '50px', margin: 0 }}>LIVE ARENA</h1>
                        <p style={{ color: 'var(--mut)', fontFamily: 'IBM Plex Mono' }}>VOTING WEIGHT: 70% JUDGE / 30% CROWD</p>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
                        {artists.map(artist => {
                            const totalVotes = artists.reduce((acc, curr) => acc + curr.votes, 0);
                            const crowdPct = (artist.votes / totalVotes) * 100;
                            const score = ((artist.judgeScore * 0.7) + (crowdPct * 0.3)).toFixed(1);
                            return (
                                <div key={artist.id} className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                        <h2 style={{ fontFamily: 'Bebas Neue', fontSize: '32px', margin: 0 }}>{artist.name}</h2>
                                        <div style={{ fontSize: '28px', color: artist.color, fontWeight: 'bold' }}>{score}</div>
                                    </div>
                                    <div className="progress-container">
                                        <div className="progress-fill" style={{ width: `${score}%`, background: artist.color }}></div>
                                    </div>
                                    <button className="btn-main" onClick={() => castVote(artist.id)}>VOTE (-10 XP)</button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const SignupView = () => (
                <div style={{ maxWidth: '600px', margin: '0 auto' }}>
                    <h1 style={{ fontFamily: 'Bebas Neue', fontSize: '40px' }}>REGISTRATION</h1>
                    <div className="card">
                        <div className="form-group">
                            <label>I AM APPLYING AS A:</label>
                            <select>
                                <option>Artist ($40 Fee)</option>
                                <option>Vendor ($40 Fee)</option>
                                <option>Title Sponsor ($300-$500)</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>FULL NAME / BRAND</label>
                            <input type="text" placeholder="e.g. John Doe Art" />
                        </div>
                        <div className="form-group">
                            <label>EMAIL</label>
                            <input type="email" placeholder="contact@email.com" />
                        </div>
                        <button className="btn-main" onClick={() => alert('Application Sent! Please proceed to Payment.')}>SUBMIT APPLICATION</button>
                    </div>
                </div>
            );

            const PaymentView = () => (
                <div style={{ maxWidth: '600px', margin: '0 auto' }}>
                    <h1 style={{ fontFamily: 'Bebas Neue', fontSize: '40px' }}>SECURE PAYMENTS</h1>
                    <p style={{fontFamily:'IBM Plex Mono', color:'var(--mut)', marginBottom:'20px'}}>All transactions are handled securely via Square.</p>
                    
                    <div className="card" style={{borderColor: 'var(--ora)'}}>
                        <h3 style={{fontFamily:'Bebas Neue', margin:0}}>ARTIST / VENDOR ENTRY</h3>
                        <p style={{fontSize:'14px', color:'var(--mut)'}}>Mandatory $40 participation fee.</p>
                        <a href="https://square.link/u/YOUR_LINK_HERE" target="_blank" className="btn-main">PAY $40 VIA SQUARE</a>
                    </div>

                    <div className="card" style={{borderColor: 'var(--blu)'}}>
                        <h3 style={{fontFamily:'Bebas Neue', margin:0}}>SPONSORSHIP - TIER 1</h3>
                        <p style={{fontSize:'14px', color:'var(--mut)'}}>$300 Supporting Sponsor Package.</p>
                        <a href="https://square.link/u/YOUR_LINK_HERE" target="_blank" className="btn-main">PAY $300 VIA SQUARE</a>
                    </div>
                </div>
            );

            return (
                <div>
                    <nav className="nav">
                        <div className="logo" onClick={() => setView('arena')}>CANVAS WARS</div>
                        <div className="nav-links">
                            <span onClick={() => setView('arena')}>ARENA</span>
                            <span onClick={() => setView('signup')}>SIGN UP</span>
                            <span onClick={() => setView('square')}>PAYMENTS</span>
                        </div>
                        <div style={{fontFamily:'IBM Plex Mono', fontSize:'12px'}}>XP: <span style={{color:'var(--red)'}}>{userPoints}</span></div>
                    </nav>

                    <div style={{ padding: '30px' }}>
                        {view === 'arena' && <ArenaView />}
                        {view === 'signup' && <SignupView />}
                        {view === 'square' && <PaymentView />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
