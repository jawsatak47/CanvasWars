<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Wars 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; border: 2px solid #ff4500; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px #ff4500; background: rgba(255, 69, 0, 0.05); }
        h1 { color: #ff4500; font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { font-size: 1.2rem; color: #ccc; }
        .status { margin-top: 20px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>
    <div id="root">
        <div class="container">
            <h1>CANVAS WARS</h1>
            <p>Southern Oregon Artist Contest | Summer 2026</p>
            <div class="status">SYSTEM ONLINE - READY FOR ARTISTS</div>
        </div>
    </div>

    <script type="text/babel">
        // Your React logic will go here once the site is stable
        function App() {
            return (
                <div className="container">
                    <h1>CANVAS WARS</h1>
                    <p>Southern Oregon Artist Contest | Summer 2026</p>
                    <div className="status">LIVE PREVIEW ACTIVE</div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
