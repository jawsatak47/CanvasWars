<!DOCTYPE html>
<html>
<head>
    <title>Canvas Wars</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 
       // import { useState, useEffect, useRef, useCallback } from "react";
 
/* ═══════════════════════════════════════════════════════
   CANVAS WARS — FULL PLATFORM + LIVE VOTING SYSTEM
   All screens in one app
═══════════════════════════════════════════════════════ */
 
const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap');`;
 
const STYLES = `
${FONTS}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060608; --s1:#0e0e12; --s2:#16161c; --s3:#1e1e26; --bdr:#252530;
  --red:#FF2600; --ora:#FF7A00; --yel:#FFD600; --blu:#00CFFF; --grn:#00FF88;
  --pnk:#FF2D78; --wht:#F0EDE8; --mut:#52526a; --mut2:#2e2e40;
}
body{background:var(--bg);color:var(--wht);font-family:'Barlow Condensed',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--red)}
 
/* NOISE OVERLAY */
.noise-layer::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity:.5}
 
/* SCAN LINES */
.scanlines::before{content:'';position:fixed;inset:0;z-index:9997;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
 
/* ── TYPOGRAPHY ─────────────────── */
.bebas{font-family:'Bebas Neue',cursive}
.mono{font-family:'IBM Plex Mono',monospace}
 
/* ── KEYFRAMES ───────────────────── */
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes glow-red{0%,100%{text-shadow:0 0 20px rgba(255,38,0,.7)}50%{text-shadow:0 0 50px rgba(255,38,0,1),0 0 100px rgba(255,122,0,.4)}}
@keyframes glow-blu{0%,100%{text-shadow:0 0 20px rgba(0,207,255,.7)}50%{text-shadow:0 0 50px rgba(0,207,255,1)}}
@keyframes glow-grn{0%,100%{text-shadow:0 0 20px rgba(0,255,136,.7)}50%{text-shadow:0 0 50px rgba(0,255,136,1)}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes rotate{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.03);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes qrscan{0%,100%{top:14px;opacity:.7}50%{top:185px;opacity:1}}
@keyframes marquee{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
@keyframes barGrow{from{width:0}}
@keyframes countUp{0%{transform:scale(1.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ripple{to{transform:scale(5);opacity:0}}
@keyframes stampIn{0%{transform:scale(2) rotate(-15deg);opacity:0}60%{transform:scale(.9) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes waveform{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
 
/* ── TICKER ──────────────────────── */
.ticker{background:var(--red);overflow:hidden;padding:6px 0;position:relative;z-index:100}
.ticker-inner{display:flex;gap:60px;animation:marquee 24s linear infinite;white-space:nowrap}
.ticker-item{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff}
 
/* ── NAV ─────────────────────────── */
.nav{position:sticky;top:0;z-index:300;background:rgba(6,6,8,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:58px}
.logo{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:5px;cursor:pointer;
  background:linear-gradient(90deg,var(--red),var(--ora));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:2px;overflow-x:auto}
.nav-tab{background:none;border:none;color:var(--mut);font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:1px;padding:8px 12px;border-radius:4px;cursor:pointer;
  transition:all .15s;text-transform:uppercase;white-space:nowrap}
.nav-tab:hover{color:var(--wht);background:var(--s2)}
.nav-tab.active{color:var(--red);border-bottom:2px solid var(--red)}
.nav-live-badge{display:flex;align-items:center;gap:8px;background:rgba(255,38,0,.12);
  border:1px solid rgba(255,38,0,.35);border-radius:999px;padding:5px 14px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);cursor:pointer;white-space:nowrap}
.nav-live-badge:hover{background:rgba(255,38,0,.2)}
 
/* ── SHARED ATOMS ────────────────── */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;
  animation:flash 1.2s ease-in-out infinite;flex-shrink:0}
.live-dot.grn{background:var(--grn)}
.live-dot.blu{background:var(--blu)}
 
.badge-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
.pill-red{background:rgba(255,38,0,.12);border:1px solid rgba(255,38,0,.35);color:var(--red)}
.pill-blu{background:rgba(0,207,255,.1);border:1px solid rgba(0,207,255,.3);color:var(--blu)}
.pill-grn{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--grn)}
.pill-yel{background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.3);color:var(--yel)}
.pill-mut{background:var(--s2);border:1px solid var(--bdr);color:var(--mut)}
 
.btn{border:none;cursor:pointer;font-family:'Bebas Neue',cursive;letter-spacing:2px;
  border-radius:6px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-lg{font-size:20px;padding:14px 36px}
.btn-md{font-size:16px;padding:10px 24px}
.btn-sm{font-size:13px;padding:7px 16px;letter-spacing:1px}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#ff3d1a;transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,38,0,.35)}
.btn-ora{background:var(--ora);color:#fff}.btn-ora:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-blu{background:var(--blu);color:var(--bg)}.btn-blu:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,207,255,.3)}
.btn-grn{background:var(--grn);color:var(--bg)}.btn-grn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-yel{background:var(--yel);color:var(--bg)}.btn-yel:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:none;color:var(--wht);border:1px solid var(--bdr)}.btn-ghost:hover{border-color:var(--wht)}
.btn-ghost-red{background:none;color:var(--red);border:1px solid rgba(255,38,0,.4)}.btn-ghost-red:hover{background:rgba(255,38,0,.1)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}
 
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px}
.card-hover{transition:all .2s;cursor:pointer}
.card-hover:hover{border-color:rgba(255,38,0,.45);transform:translateY(-3px);box-shadow:0 12px 40px rgba(255,38,0,.12)}
 
.section-wrap{padding:0 20px;max-width:1120px;margin:0 auto}
.section-gap{padding:52px 0}
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;
  border-bottom:1px solid var(--bdr);padding-bottom:14px}
.section-title{font-family:'Bebas Neue',cursive;font-size:38px;letter-spacing:3px}
.section-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);background:none;border:none;cursor:pointer}
.section-link:hover{text-decoration:underline}
 
.page{min-height:calc(100vh - 58px);animation:fadeIn .3s ease}
 
/* ═══════════════ HOME ═══════════════ */
.home-hero{position:relative;overflow:hidden;padding:72px 20px 60px;border-bottom:1px solid var(--bdr)}
.hero-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse 65% 55% at 75% 50%,rgba(255,38,0,.1) 0%,transparent 70%),
  radial-gradient(ellipse 45% 40% at 20% 80%,rgba(255,122,0,.05) 0%,transparent 60%)}
.hero-inner{position:relative;z-index:1;max-width:1120px;margin:0 auto}
.hero-title{font-family:'Bebas Neue',cursive;font-size:clamp(68px,11vw,148px);line-height:.88;
  letter-spacing:5px;margin-bottom:20px}
.hero-title-grad{background:linear-gradient(135deg,var(--red) 0%,var(--ora) 50%,var(--yel) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:17px;color:var(--mut);max-width:460px;line-height:1.65;margin-bottom:36px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
 
.stats-strip{background:var(--s1);border-bottom:1px solid var(--bdr)}
.stats-inner{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bdr);gap:1px;
  border:1px solid var(--bdr);overflow:hidden;max-width:1120px;margin:0 auto}
.stat-box{background:var(--s1);padding:24px 20px}
.stat-num{font-family:'Bebas Neue',cursive;font-size:44px;line-height:1}
.stat-num.red{color:var(--red)}.stat-num.blu{color:var(--blu)}.stat-num.grn{color:var(--grn)}.stat-num.yel{color:var(--yel)}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
 
.active-battle-banner{background:linear-gradient(90deg,rgba(255,38,0,.1),rgba(255,122,0,.06));
  border:1px solid rgba(255,38,0,.28);border-radius:10px;padding:22px 28px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:44px}
.abn-left{display:flex;flex-direction:column;gap:6px}
.abn-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--red);text-transform:uppercase}
.abn-title{font-family:'Bebas Neue',cursive;font-size:34px;letter-spacing:3px}
.abn-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut)}
 
/* COUNTDOWN */
.countdown{display:flex;align-items:center;gap:8px}
.cd-unit{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;
  padding:10px 14px;text-align:center;min-width:54px}
.cd-num{font-family:'Bebas Neue',cursive;font-size:30px;color:var(--red);display:block;line-height:1}
.cd-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mut);text-transform:uppercase}
.cd-sep{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--mut2)}
 
/* BATTLE CARDS GRID */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bc-art{position:relative;overflow:hidden}
.bc-body{padding:18px;display:flex;flex-direction:column;gap:10px}
.bc-theme{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px}
.bc-desc{font-size:13px;color:var(--mut);line-height:1.55}
.bc-footer{display:flex;justify-content:space-between;align-items:center;
  padding-top:10px;border-top:1px solid var(--bdr);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut)}
.fee-tag{color:var(--yel);font-weight:700}
 
/* RANK ROWS */
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;
  padding:14px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.rank-row:hover{background:var(--s2)}
.rank-num{font-family:'Bebas Neue',cursive;font-size:26px;width:30px;text-align:center;color:var(--mut)}
.rank-num.g{color:var(--yel)}.rank-num.s{color:#b0b0be}.rank-num.b{color:#bf8c5a}
.rank-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:17px;flex-shrink:0}
.rank-info{flex:1}
.rank-name{font-weight:700;font-size:16px;letter-spacing:.5px;margin-bottom:2px}
.rank-loc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut)}
.rank-score{font-family:'Bebas Neue',cursive;font-size:32px;background:linear-gradient(90deg,var(--red),var(--ora));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rank-wins{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);text-align:right}
 
/* ═══════════════ BATTLES ════════════ */
.battles-hero{background:var(--s1);border-bottom:1px solid var(--bdr);padding:44px 20px}
.page-title{font-family:'Bebas Neue',cursive;font-size:60px;letter-spacing:5px;margin-bottom:6px}
.page-sub{color:var(--mut);font-size:15px;letter-spacing:.5px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:28px 0 0}
.f-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--mut);
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;
  padding:8px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all .15s}
.f-btn:hover,.f-btn.on{background:var(--red);border-color:var(--red);color:#fff}
 
.bc-full{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;
  display:grid;grid-template-columns:260px 1fr;margin-bottom:14px;cursor:pointer;transition:all .2s}
.bc-full:hover{border-color:rgba(255,38,0,.4);box-shadow:0 8px 32px rgba(255,38,0,.1)}
.bc-full-art{position:relative;overflow:hidden}
.bc-full-body{padding:24px;display:flex;flex-direction:column;justify-content:space-between}
.bc-full-title{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:2px;margin:8px 0}
.bc-full-desc{font-size:14px;color:var(--mut);line-height:1.6;margin-bottom:16px}
.bc-full-meta{display:flex;gap:20px;flex-wrap:wrap}
.bm{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut)}
.bm strong{color:var(--wht)}
 
/* ═══════════════ VOTE ONLINE ════════ */
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.vc{background:var(--s1);border:2px solid var(--bdr);border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer}
.vc.picked{border-color:var(--blu);box-shadow:0 0 36px rgba(0,207,255,.18)}
.vc-art{position:relative;overflow:hidden}
.vc-body{padding:20px}
.vc-artist{font-weight:700;font-size:16px;letter-spacing:.5px;margin-bottom:3px}
.vc-title{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);margin-bottom:16px}
.vbar-track{height:7px;background:var(--s3);border-radius:999px;overflow:hidden;margin-bottom:8px}
.vbar-fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.vbar-blu{background:linear-gradient(90deg,var(--blu),#0088bb)}
.vbar-red{background:linear-gradient(90deg,var(--red),var(--ora))}
.vbar-stat{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut)}
.vote-btn{width:100%;padding:13px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;transition:all .2s;margin-top:12px}
.vote-btn.blu-v{background:var(--blu);color:var(--bg)}.vote-btn.blu-v:hover:not(:disabled){filter:brightness(1.1)}
.vote-btn.red-v{background:var(--red);color:#fff}.vote-btn.red-v:hover:not(:disabled){filter:brightness(1.1)}
.vote-btn.done{background:var(--s3);border:2px solid var(--grn);color:var(--grn);cursor:default}
.vote-btn:disabled{opacity:.4;cursor:not-allowed}
 
/* ═══════════════ RANKINGS ═══════════ */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:36px}
.pod-card{background:var(--s1);border-radius:10px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:all .2s;cursor:pointer}
.pod-card:hover{transform:translateY(-4px)}
.pod-icon{font-size:44px}
.pod-name{font-weight:700;font-size:16px;letter-spacing:.5px}
.pod-handle{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:8px}
.pod-row{display:flex;gap:20px;border-top:1px solid var(--bdr);padding-top:10px;width:100%;justify-content:center}
.pod-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.pod-stat-n{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--red)}
.pod-stat-l{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
 
/* ═══════════════ LIVE EVENT ═════════ */
.event-hero{background:linear-gradient(160deg,#0c0004,#0a0010,#060608);
  border-bottom:1px solid rgba(255,38,0,.2);padding:60px 20px;text-align:center;position:relative;overflow:hidden}
.event-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 100%,rgba(255,38,0,.14) 0%,transparent 70%)}
.event-hero-inner{position:relative;z-index:1}
.event-date-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,38,0,.14);
  border:1px solid rgba(255,38,0,.4);border-radius:999px;padding:6px 20px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.event-title{font-family:'Bebas Neue',cursive;font-size:clamp(56px,8vw,108px);letter-spacing:8px;margin-bottom:14px;line-height:.9}
.event-sub{color:var(--mut);font-size:16px;margin-bottom:28px}
.event-loc{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--mut);
  border:1px solid var(--bdr);display:inline-block;padding:10px 24px;border-radius:4px;margin-bottom:32px}
.event-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
 
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--red),transparent)}
.tl-item{position:relative;margin-bottom:26px}
.tl-dot{position:absolute;left:-34px;top:4px;width:10px;height:10px;border-radius:50%;
  background:var(--red);border:2px solid var(--bg);box-shadow:0 0 8px rgba(255,38,0,.5)}
.tl-time{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);margin-bottom:3px}
.tl-ev{font-weight:700;font-size:16px;letter-spacing:.5px;margin-bottom:2px}
.tl-note{font-size:13px;color:var(--mut)}
 
.sponsor-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sponsor-card{background:var(--s1);border:1px dashed var(--bdr);border-radius:10px;
  padding:26px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px;align-items:center}
.sponsor-card:hover{border-color:var(--red);border-style:solid}
.sponsor-tier-label{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px}
.sponsor-price{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--yel)}
.sponsor-desc{font-size:13px;color:var(--mut);line-height:1.6}
.sponsor-spots{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
 
/* ═══════════════ CHECK-IN FLOW ══════ */
.checkin-wrap{max-width:460px;margin:0 auto;padding:44px 20px}
.ci-step{animation:slideUp .35s ease}
.step-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.step-num{font-family:'Bebas Neue',cursive;font-size:80px;color:var(--s3);line-height:1;margin-bottom:-8px}

.qr-corner.br{bottom:8px;right:8px;border-bottom-width:3px;border-right-width:3px}

function ArtPlaceholder({seed=1,h=180}) {
  const palettes = [
    ["#FF2600","#FF7A00"],["#FFD600","#FF2600"],["#00FF88","#00CFFF"],
    ["#FF2600","#FFD600"],["#7B2FFF","#FF2600"],["#00CFFF","#7B2FFF"],
  ];
  const [c1,c2] = palettes[seed%palettes.length];
  const shapes = Array.from({length:9},(_,i)=>({
    type:i%3===0?"circle":i%3===1?"rect":"tri",
    x:((seed*19+i*41)%78)+11,y:((seed*13+i*31)%68)+11,
    sz:((seed*7+i*13)%28)+10,rot:(seed*5+i*19)%360
  }));
  return (
    <svg width="100%" height={h} xmlns="http://www.w3.org/2000/svg"
      style={{display:"block",background:`linear-gradient(135deg,${c1}18,${c2}18)`}}>
      <defs>
        <linearGradient id={`g${seed}`} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={c1} stopOpacity=".85"/>
          <stop offset="100%" stopColor={c2} stopOpacity=".85"/>
        </linearGradient>
      </defs>
      {shapes.map((s,i)=>{
        const fill=i%2===0?`url(#g${seed})`:`${c2}44`;
        if(s.type==="circle") return <circle key={i} cx={`${s.x}%`} cy={`${s.y}%`} r={s.sz} fill={fill} opacity=".7"/>;
        if(s.type==="rect") return <rect key={i} x={`${s.x}%`} y={`${s.y}%`} width={s.sz*1.6} height={s.sz}
          fill={fill} transform={`rotate(${s.rot},${s.x*3.8},${s.y*1.7})`} opacity=".6"/>;
        const cx=s.x*4,cy=s.y*1.8;
        return <polygon key={i} points={`${cx},${cy-s.sz} ${cx+s.sz},${cy+s.sz} ${cx-s.sz},${cy+s.sz}`} fill={fill} opacity=".55"/>;
      })}
    </svg>
  );
}

      <span style={{color:bg}}>{initials}</span>
    </div>
  );
}
 
function useCountdown(targetDays,targetHours) {
  const [t,setT] = useState({d:targetDays,h:targetHours,m:0,s:0});
  useEffect(()=>{
    let total=(targetDays*86400)+(targetHours*3600);
    const iv=setInterval(()=>{
      total=Math.max(0,total-1);
      setT({d:Math.floor(total/86400),h:Math.floor((total%86400)/3600),m:Math.floor((total%3600)/60),s:total%60});
    },1000);
    return ()=>clearInterval(iv);
  },[]);
  return t;
}
 
function Countdown({days,hours}) {
  const t=useCountdown(days,hours);
  return (
    <div className="countdown">
      {[["d","Days"],["h","Hrs"],["m","Min"],["s","Sec"]].map(([k,l])=>(
        <div className="cd-unit" key={k}>
          <span className="cd-num">{String(t[k]).padStart(2,"0")}</span>
          <span className="cd-lbl">{l}</span>
        </div>
      ))}
    </div>
  );
}

function VotePage() {
  const [votes,setVotes]=useState({});
  const [entries,setEntries]=useState(VOTE_ENTRIES);
  const hasVoted=Object.keys(votes).length>0;
  const total=entries.reduce((s,e)=>s+e.votes,0);
  const handle=(id)=>{if(hasVoted)return;setVotes({[id]:true});setEntries(p=>p.map(e=>e.id===id?{...e,votes:e.votes+1}:e));};
  return (
    <div className="page">
      <div className="battles-hero">
        <div style={{maxWidth:1120,margin:"0 auto"}}>
          <div className="page-title">VOTE</div>
          <div className="page-sub">Battle: <strong>NEON WILDERNESS</strong> — Voting closes in 18 hrs</div>
          <div style={{marginTop:12}}>
            {!hasVoted&&<span className="badge-pill pill-red"><span className="live-dot"/>Cast your vote — one per account</span>}
            {hasVoted&&<span className="badge-pill pill-grn"><span className="live-dot grn"/>✓ Vote recorded — results update live</span>}
          </div>
        </div>
      </div>
      <div className="section-gap">
        <div className="section-wrap">
          <div className="vote-grid">
            {entries.map((e,i)=>{
              const pct=Math.round((e.votes/total)*100);
              const picked=!!votes[e.id];
              const isBlue=i%2===0;
              return (
                <div key={e.id} className={`vc ${picked?"picked":""}`} onClick={()=>handle(e.id)}>
                  <div className="vc-art"><ArtPlaceholder seed={e.seed} h={280}/></div>
                  <div className="vc-body">
                    <div className="vc-artist">{e.artist}</div>
                    <div className="vc-title">"{e.title}"</div>
                    {hasVoted&&<>
                      <div className="vbar-track"><div className={`vbar-fill ${isBlue?"vbar-blu":"vbar-red"}`} style={{width:`${pct}%`}}/></div>
                      <div className="vbar-stat">{e.votes} votes · {pct}%</div>
                    </>}
                    <button className={`vote-btn ${picked?"done":isBlue?"blu-v":"red-v"}`}
                      onClick={ev=>{ev.stopPropagation();handle(e.id);}} disabled={hasVoted&&!picked}>
                      {picked?"✓ VOTED":"VOTE"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ LIVE VOTING ARENA ══════════════════════════════════ */
function ArenaPage({setPage}) {
  const [timeLeft,setTimeLeft]=useState(87);
  const [votes,setVotes]=useState({a:127,b:94});
  const [myVote,setMyVote]=useState(null);
  const [ratings,setRatings]=useState({style:[0,0],creativity:[0,0],execution:[0,0]});
  const [reactions,setReactions]=useState([142,88,67,203,31]);
  const [chatMsgs,setChatMsgs]=useState(CHAT_SEED);
  const [chatInput,setChatInput]=useState("");
  const [showBig,setShowBig]=useState(false);
  const [crowd,setCrowd]=useState(74);
  const chatRef=useRef(null);
 
  useEffect(()=>{
    const iv=setInterval(()=>{
      setTimeLeft(p=>Math.max(0,p-1));
      if(Math.random()>.6){
        const side=Math.random()>.5?"a":"b";
        setVotes(p=>({...p,[side]:p[side]+Math.floor(Math.random()*3)+1}));
        setCrowd(p=>Math.min(100,p+Math.floor(Math.random()*2)));
      }
    },1000);
    return ()=>clearInterval(iv);
  },[]);
 
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[chatMsgs]);
 
  const total=votes.a+votes.b;
  const pctA=Math.round((votes.a/total)*100);
  const pctB=100-pctA;
  const isEnding=timeLeft<20;
  const sendChat=()=>{
    if(!chatInput.trim())return;
    setChatMsgs(p=>[...p,{user:"@you",badge:"VIP",msg:chatInput}]);
    setChatInput("");
  };
 
  const castVote=(side)=>{
    if(myVote)return;
    setMyVote(side);
    setVotes(p=>({...p,[side]:p[side]+1}));
  };
 
  const REACTS=["🔥","👑","💀","🎨","⚡"];
 
  return (
    <div className="page">
      {showBig&&<BigScreen votes={votes} pctA={pctA} pctB={pctB} timeLeft={timeLeft} onClose={()=>setShowBig(false)}/>}
 
      <div className="arena-top">
        <div>
          <div className="badge-pill pill-red" style={{marginBottom:6}}><span className="live-dot"/>Round 2 of 3 — Live Voting Open</div>
          <div className="arena-round">URBAN DECAY · FINALS</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div className="vt-wrap">
            <div className={`vote-timer-big ${isEnding?"ending":"ok"}`}>{String(Math.floor(timeLeft/60)).padStart(2,"0")}:{String(timeLeft%60).padStart(2,"0")}</div>
            <div className="vt-lbl">Time Remaining</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowBig(true)}>⛶ BIG SCREEN</button>
        </div>
      </div>
 
      <div className="crowd-meter-wrap">
        <div className="crowd-meter-hd">
          <span className="crowd-meter-lbl">Crowd Participation</span>
          <span className="crowd-meter-lbl">{crowd}% · {total} votes cast</span>
        </div>
        <div className="crowd-meter-track"><div className="crowd-meter-fill" style={{width:`${crowd}%`}}/></div>
      </div>
 
      <div className="sponsor-banner">
        <div>
          <div className="sb-label">This Round Presented By</div>
          <div className="sb-name">DICK BLICK ART MATERIALS</div>
        </div>
        <span className="badge-pill pill-yel">SPONSOR</span>
      </div>
 
      <div className="vs-layout">
        <div className={`artist-tile ${myVote==="a"?"selected":myVote==="b"?"opp-selected":""}`}>
          <div className="at-art"><ArtPlaceholder seed={1} h={180}/>
            <div style={{position:"absolute",top:10,left:10}}><Avatar name="Marcus T." seed={1} size={36}/></div>
          </div>
          <div className="at-body">
            <div className="at-name">MARCUS T.</div>
            <div className="at-handle">@marcust_art · Portland, OR</div>
            <div className="at-bar-wrap">
              <div className="at-bar-hd"><span>Audience</span><strong style={{color:"var(--blu)"}}>{pctA}%</strong></div>
              <div className="at-bar-track"><div className="at-bar-fill blu" style={{width:`${pctA}%`}}/></div>
            </div>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"var(--mut)",marginBottom:12}}>{votes.a} votes</div>
            <button className={`vote-btn-arena blu ${myVote==="a"?"voted-ok":""}`}
              onClick={()=>castVote("a")} disabled={!!myVote&&myVote!=="a"}>
              {myVote==="a"?"✓ VOTED":"VOTE A"}
            </button>
          </div>
        </div>
 
        <div className="vs-divider"><div className="vs-text">VS</div></div>
 
        <div className={`artist-tile ${myVote==="b"?"selected":myVote==="a"?"opp-selected":""}`}>
          <div className="at-art"><ArtPlaceholder seed={2} h={180}/>
            <div style={{position:"absolute",top:10,left:10}}><Avatar name="Yuki Ran" seed={2} size={36}/></div>
          </div>
          <div className="at-body">
            <div className="at-name">YUKI RAN</div>
            <div className="at-handle">@yukiranstudio · Seattle, WA</div>
            <div className="at-bar-wrap">
              <div className="at-bar-hd"><span>Audience</span><strong style={{color:"var(--red)"}}>{pctB}%</strong></div>
              <div className="at-bar-track"><div className="at-bar-fill red" style={{width:`${pctB}%`}}/></div>
            </div>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"var(--mut)",marginBottom:12}}>{votes.b} votes</div>
            <button className={`vote-btn-arena red ${myVote==="b"?"voted-ok":""}`}
              onClick={()=>castVote("b")} disabled={!!myVote&&myVote!=="b"}>
              {myVote==="b"?"✓ VOTED":"VOTE B"}
            </button>
          </div>
        </div>
      </div>
 
      <div className="breakdown">
        {[["Audience Vote","30%","red"],["Judge Panel","70%","blu"],["Global Online","–","mut"]].map(([l,p,c])=>(
          <div className="bd-box" key={l}>
            <div className={`bd-pct`} style={{color:`var(--${c})`}}>{p}</div>
            <div className="bd-lbl">{l}</div>
          </div>
        ))}
      </div>
 
      {myVote&&(
        <div className="ratings-section">
          <div className="ratings-title">RATE THE PERFORMANCES</div>
          <div>
            {[["style","Style & Aesthetic"],["creativity","Creativity"],["execution","Execution"]].map(([key,label])=>(
              <div className="rating-row" key={key}>
                <span className="rating-cat">{label}</span>
                <div className="stars">
                  {[1,2,3,4,5].map(n=>(
                    <span key={n} className={`star ${ratings[key][myVote==="a"?0:1]>=n?"on":""}`}
                      onClick={()=>setRatings(p=>({...p,[key]:p[key].map((v,i)=>i===(myVote==="a"?0:1)?n:v)}))}>★</span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
 
      <div className="reactions">
        {REACTS.map((r,i)=>(
          <button key={r} className="react-btn" onClick={()=>setReactions(p=>p.map((v,j)=>j===i?v+1:v))}>
            {r}<span className="react-count">{reactions[i]}</span>
          </button>
        ))}
      </div>
 
      <div className="chat-wrap">
        <div className="chat-title">LIVE CHAT</div>
        <div className="chat-msgs" ref={chatRef}>
          {chatMsgs.map((m,i)=>(
            <div className="chat-msg" key={i}>
              {m.badge&&<span className="chat-badge">{m.badge}</span>}
              <span className="chat-user">{m.user}</span>
              {m.msg}
            </div>
          ))}
        </div>
        <div className="chat-input-row">
          <input className="chat-input" value={chatInput} onChange={e=>setChatInput(e.target.value)}
            placeholder="Say something…" onKeyDown={e=>e.key==="Enter"&&sendChat()}/>
          <button className="btn btn-red btn-sm" onClick={sendChat}>SEND</button>
        </div>
      </div>
    </div>
  );
}

              {icon:"💰",bg:"rgba(255,122,0,.1)",title:"VIP Voting Tier",note:"1.5× vote weight · Unlock at 1000 XP",pts:1000},
            ].map((r,i)=>(
              <div className="reward-item" key={i}>
                <div className="reward-icon" style={{background:r.bg}}>{r.icon}</div>
                <div>
                  <div className="reward-title">{r.title}</div>
                  <div className="reward-note">{r.note}</div>
                </div>
                {r.pts?<div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:"var(--mut)",marginLeft:"auto"}}>{r.pts} XP</div>
                :<button className="btn btn-ghost-red btn-sm" style={{marginLeft:"auto"}}>CLAIM</button>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Ticker() {
  const items=[
