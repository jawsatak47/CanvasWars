<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS WARS | The Battle Engine</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #060608; --s1: #0e0e12; --s2: #16161c; --bdr: #252530;
            --red: #FF2600; --ora: #FF7A00; --blu: #00CFFF; --wht: #F0EDE8; --mut: #52526a; --gold: #FFD700;
        }

        body { background: var(--bg); color: var(--wht); font-family: 'Barlow Condensed', sans-serif; margin: 0; overflow-x: hidden; }
        .noise::after { content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .nav { height: 70px; background: rgba(14,14,18,0.95); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--bdr); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 32px; letter-spacing: 2px; color: var(--red); }
        .stats-bar { display: flex; gap: 20px; font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--mut); }
        .stat-val { color: var(--wht); font-weight: bold; }

        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 8px; padding: 20px; position: relative; overflow: hidden; }
        .btn-main { background: var(--red); color: white; border: none; padding: 10px 20px; font-family: 'Bebas Neue'; font-size: 18px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        .progress-container { height: 6px; background: var(--s2); border-radius: 3px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .badge { font-family: 'IBM Plex Mono'; font-size: 10px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .badge-live { background: rgba(255, 38, 0, 0.2); color: var(--red); border: 1px solid var(--red); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .live-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="noise">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const INITIAL_ARTISTS = [
            { id: 1, name: "VANDAL QUEEN", votes: 142, judgeScore: 88, color: '#FF2600' },
            { id: 2, name: "THE PHANTOM", votes: 128, judgeScore: 92, color: '#00CFFF' }
        ];

        function App() {
            const [userPoints, setUserPoints] = useState(150);
            const [artists, setArtists] = useState(INITIAL_ARTISTS);

            // Logic: 30% Crowd weight, 70% Judge weight 
            const getWeightedScore = (artist) => {
                const totalVotes = artists.reduce((acc, curr) => acc + curr.votes, 0);
                const crowdPercent = totalVotes > 0 ? (artist.votes / totalVotes) * 100 : 0;
                return ((artist.judgeScore * 0.7) + (crowdPercent * 0.3)).toFixed(1);
            };

            const castVote = (id) => {
                if (userPoints >= 10) {
                    setArtists(artists.map(a => a.id === id ? { ...a, votes: a.votes + 1 } : a));
                    setUserPoints(userPoints - 10);
                } else {
                    alert("Not enough War-Points! Visit a sponsor booth to redeem more.");
                }
            };

            return (
                <div>
                    <nav className="nav">
                        <div className="logo">CANVAS WARS</div>
                        <div className="stats-bar">
                            <div>WAR-POINTS: <span className="stat-val">{userPoints} XP</span></div>
                            <div>EVENT DATE: <span className="stat-val">JUNE 6TH</span> [cite: 36]</div>
                        </div>
                    </nav>

                    <div style={{ padding: '30px', maxWidth: '1200px', margin: '0 auto' }}>
                        <div style={{ marginBottom: '40px', borderLeft: '4px solid var(--red)', paddingLeft: '20px' }}>
                            <div className="badge badge-live"><span className="live-dot"></span>Live Event Voting Open</div>
                            <h1 style={{ fontFamily: 'Bebas Neue', fontSize: '48px', margin: '5px 0' }}>BEAR CREEK PARK BATTLE [cite: 39]</h1>
                            <p style={{ color: 'var(--mut)', fontFamily: 'IBM Plex Mono' }}>Main Event: 11:00 AM - 4:00 PM </p>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(350px, 1fr))', gap: '25px' }}>
                            {artists.map(artist => (
                                <div key={artist.id} className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                        <h2 style={{ fontFamily: 'Bebas Neue', fontSize: '36px', margin: 0 }}>{artist.name}</h2>
                                        <div style={{ textAlign: 'right' }}>
                                            <div style={{ fontSize: '24px', fontWeight: 'bold', color: artist.color }}>{getWeightedScore(artist)}</div>
                                            <div style={{ fontSize: '10px', color: 'var(--mut)' }}>RANK SCORE</div>
                                        </div>
                                    </div>
                                    <div className="progress-container">
                                        <div className="progress-fill" style={{ width: `${getWeightedScore(artist)}%`, background: artist.color }}></div>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px', fontFamily: 'IBM Plex Mono', fontSize: '13px' }}>
                                        <span>CROWD: {artist.votes}</span>
                                        <span>JUDGE: {artist.judgeScore}</span>
                                    </div>
                                    <button className="btn-main" style={{ width: '100%' }} onClick={() => castVote(artist.id)}>
                                        CAST VOTE (-10 XP)
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div style={{ marginTop: '60px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '40px' }}>
                            <div className="card" style={{borderColor: 'var(--ora)'}}>
                                <h3 style={{fontFamily:'Bebas Neue', color: 'var(--ora)'}}>💰 OFFICIAL STRUCTURE</h3>
                                <ul style={{fontFamily: 'IBM Plex Mono', fontSize: '13px', color: 'var(--mut)', lineHeight: '1.8', listStyle: 'none', padding: 0}}>
                                    <li>• Entry Fee: <span style={{color: 'white'}}>$40</span> [cite: 56]</li>
                                    <li>• 1st Place Prize: <span style={{color: 'white'}}>$300</span> [cite: 17]</li>
                                    <li>• Artist Revenue Split: <span style={{color: 'white'}}>70%</span> [cite: 23]</li>
                                    <li>• Event Revenue Split: <span style={{color: 'white'}}>30%</span> [cite: 24]</li>
                                </ul>
                            </div>
                            <div className="card" style={{borderColor: 'var(--blu)'}}>
                                <h3 style={{fontFamily:'Bebas Neue', color: 'var(--blu)'}}>🎨 MATERIALS LIST [cite: 70-76]</h3>
                                <div style={{fontFamily: 'IBM Plex Mono', fontSize: '11px', color: 'var(--mut)', display: 'grid', gridTemplateColumns: '1fr 1fr'}}>
                                    <span>• ACRYLIC</span>
                                    <span>• WATERCOLOR</span>
                                    <span>• MARKER</span>
                                    <span>• CHARCOAL</span>
                                    <span>• GOLD LEAF</span>
                                    <span>• GRAPHITE</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
