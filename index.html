<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS WARS | Creative Platform</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #060608; --s1: #0e0e12; --s2: #16161c; --bdr: #252530;
            --red: #FF2600; --ora: #FF7A00; --blu: #00CFFF; --wht: #F0EDE8; --mut: #52526a;
        }

        body { 
            background: var(--bg); 
            color: var(--wht); 
            font-family: 'Barlow Condensed', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Noise effect for that "Resident Artist" aesthetic */
        .noise::after {
            content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        }

        .nav { 
            height: 60px; background: rgba(14,14,18,0.95); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 20px;
            border-bottom: 1px solid var(--bdr); position: sticky; top: 0; z-index: 100;
        }

        .logo { 
            font-family: 'Bebas Neue', cursive; font-size: 32px; letter-spacing: 4px;
            background: linear-gradient(90deg, var(--red), var(--ora));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero { text-align: center; padding: 80px 20px; }
        .hero-title { font-family: 'Bebas Neue'; font-size: 80px; line-height: 0.8; margin-bottom: 20px; color: var(--red); }
        
        .vote-card { 
            background: var(--s1); border: 1px solid var(--bdr); border-radius: 12px; 
            padding: 24px; transition: 0.3s; cursor: pointer;
        }
        .vote-card:hover { border-color: var(--red); transform: translateY(-5px); }
        
        .btn-red { 
            background: var(--red); color: white; border: none; padding: 12px 30px; 
            font-family: 'Bebas Neue'; font-size: 20px; cursor: pointer; border-radius: 4px;
        }
    </style>
</head>
<body class="noise">
    <div id="root">
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column;">
            <h1 style="font-family:sans-serif; color:#FF2600;">CANVAS WARS</h1>
            <p style="color:#52526a;">Initializing Battle Engine...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function CanvasWars() {
            const [view, setView] = useState('home');
            const [votes, setVotes] = useState({ artistA: 64, artistB: 36 });

            const handleVote = (id) => {
                setVotes(prev => ({
                    ...prev,
                    [id]: prev[id] + 1
                }));
            };

            return (
                <div>
                    <nav className="nav">
                        <div className="logo">CANVAS WARS</div>
                        <div style={{display:'flex', gap:'20px'}}>
                            <span onClick={() => setView('home')} style={{cursor:'pointer', fontFamily:'Bebas Neue'}}>HOME</span>
                            <span onClick={() => setView('live')} style={{cursor:'pointer', fontFamily:'Bebas Neue', color:'var(--red)'}}>LIVE ARENA</span>
                        </div>
                    </nav>

                    <div style={{maxWidth:'1100px', margin:'0 auto', padding:'20px'}}>
                        {view === 'home' ? (
                            <div className="hero">
                                <h1 className="hero-title">CREATIVE<br/>COMBAT</h1>
                                <p style={{fontFamily:'IBM Plex Mono', color:'var(--mut)', marginBottom:'40px'}}>SOUTHERN OREGON | SUMMER 2026</p>
                                <button className="btn-red" onClick={() => setView('live')}>ENTER THE ARENA</button>
                            </div>
                        ) : (
                            <div style={{marginTop:'40px'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'30px'}}>
                                    <div style={{width:'10px', height:'10px', borderRadius:'50%', background:'var(--red)', animation:'pulse 1s infinite'}}></div>
                                    <span style={{fontFamily:'IBM Plex Mono', fontSize:'12px'}}>LIVE EVENT: LIVE AUDIENCE VOTING OPEN</span>
                                </div>

                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'20px'}}>
                                    <div className="vote-card" onClick={() => handleVote('artistA')}>
                                        <h2 style={{fontFamily:'Bebas Neue', fontSize:'32px'}}>ARTIST 01</h2>
                                        <div style={{height:'8px', background:'var(--s2)', borderRadius:'4px', margin:'15px 0'}}>
                                            <div style={{height:'100%', background:'var(--blu)', width:`${(votes.artistA / (votes.artistA + votes.artistB)) * 100}%`, transition:'0.5s', borderRadius:'4px'}}></div>
                                        </div>
                                        <div style={{display:'flex', justifyContent:'space-between', fontFamily:'IBM Plex Mono', fontSize:'14px'}}>
                                            <span>THE PHANTOM</span>
                                            <span style={{color:'var(--blu)'}}>{Math.round((votes.artistA / (votes.artistA + votes.artistB)) * 100)}%</span>
                                        </div>
                                    </div>

                                    <div className="vote-card" onClick={() => handleVote('artistB')}>
                                        <h2 style={{fontFamily:'Bebas Neue', fontSize:'32px'}}>ARTIST 02</h2>
                                        <div style={{height:'8px', background:'var(--s2)', borderRadius:'4px', margin:'15px 0'}}>
                                            <div style={{height:'100%', background:'var(--red)', width:`${(votes.artistB / (votes.artistA + votes.artistB)) * 100}%`, transition:'0.5s', borderRadius:'4px'}}></div>
                                        </div>
                                        <div style={{display:'flex', justifyContent:'space-between', fontFamily:'IBM Plex Mono', fontSize:'14px'}}>
                                            <span>VANDAL QUEEN</span>
                                            <span style={{color:'var(--red)'}}>{Math.round((votes.artistB / (votes.artistA + votes.artistB)) * 100)}%</span>
                                        </div>
                                    </div>
                                </div>
                                <p style={{textAlign:'center', marginTop:'40px', color:'var(--mut)', fontSize:'12px', fontFamily:'IBM Plex Mono'}}>TAP CARD TO CAST VOTE</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CanvasWars />);
    </script>
</body>
</html>
